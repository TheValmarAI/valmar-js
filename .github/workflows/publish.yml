name: Publish

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm dist-tag
        required: true
        default: latest
        type: choice
        options:
          - latest
          - beta
          - next

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Inspect package
        run: |
          npm pack --json > /tmp/valmar-sdk-npm-pack.json
          node - <<'JS'
          const fs = require("fs");
          const pack = JSON.parse(fs.readFileSync("/tmp/valmar-sdk-npm-pack.json", "utf8"))[0];
          const forbidden = ["src/", "tests/", "node_modules/", ".env"];
          const bad = pack.files
            .map((file) => file.path)
            .filter((path) => forbidden.some((part) => path.includes(part)));
          if (bad.length > 0) {
            throw new Error(`npm package contains forbidden files: ${bad.join(", ")}`);
          }
          for (const file of pack.files) {
            console.log(file.path);
          }
          JS

      - name: Smoke install
        run: |
          TARBALL="$(npm pack --silent)"
          mkdir -p /tmp/valmar-js-smoke
          cd /tmp/valmar-js-smoke
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE/$TARBALL" >/dev/null
          node --input-type=module - <<'JS'
          import { Valmar } from "@valmar-ai/sdk";
          const client = new Valmar({
            apiKey: "valmr_proj_sk_test",
            baseUrl: "https://api.example.test",
            organizationId: "11111111-1111-4111-8111-111111111111",
            projectId: "22222222-2222-4222-8222-222222222222",
          });
          if (!client.knowledge || !client.knowledgeRequests || !client.people) {
            throw new Error("SDK resources were not initialized");
          }
          JS

      - name: Publish to npm
        run: npm publish --tag "${{ inputs.npm_tag }}" --access public
